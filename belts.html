<script src="assets/js/site.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  async function loadPage() {
    const res = await fetch('outreach/belts/Belt Organizer Instructions Page.md');
    if (!res.ok) { console.log('fetch failed'); return ''; }
    return res.text();
  }

  function addPost(text) {
    const article = document.createElement('article');
    const rec = document.createElement('div');
    // Rewrite absolute image paths to relative so they work on any base URL
    const fixed = text.replace(/!\[([^\]]*)\]\(\/outreach\//g, '![$1](outreach/');
    rec.innerHTML = marked.parse(fixed);
    article.appendChild(rec);
    document.getElementById('post').replaceChildren(article);
  }

  document.addEventListener('DOMContentLoaded', async function() {
    const text = await loadPage();
    addPost(text);
  });
</script>
